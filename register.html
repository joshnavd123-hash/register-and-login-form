<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <style>
        button{
        padding: 10px 20px;
        font-size: larger;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }
    button:hover{
        background-color: lightcoral;
       
    }
    </style>
</head>
<body style="background-color: blanchedalmond;">
    <h1 style="text-align: center;"><u>Registration Form</u></h1>
            <H3 style="background-color:rgb(166, 75, 252); text-align: center; padding: 15px;"> HEY NEW USER! WE ARE HAPPY TO SERVE YOU!</H3>
    <form style="text-align: center;">
        <label style="font-size: larger; color: rgb(240, 14, 14);"> Username: </label>  <input type="text" placeholder="ENTER YOUR NAME" autofocus/><br><BR>
        <label style="font-size: larger; color: rgb(240, 14, 14);"> Email: </label>  <input type="email" placeholder="ENTER YOUR EMAIL" autofocus/ > <br><BR>
        <label style="font-size: larger; color: rgb(240, 14, 14);"> Password: </label>  <input type="password" placeholder="ENTER YOUR PASSWORD" autofocus/ > <br><BR>
        <label style="font-size: larger; color: rgb(240, 14, 14);"> Confirm Password: </label>  <input type="password" placeholder="CONFIRM YOUR PASSWORD" autofocus/ > <br><BR>
        <button style="color: blueviolet;">SUBMIT</button>
    <h2>Already have an account?</h2> <a href="./login.html" style="display: block; text-align: center; color: blue;">Login here</a>
    </form>
</body>
</html>
